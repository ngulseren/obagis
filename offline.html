<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çevrimdışı - OBAGIS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111827;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .offline-container {
            max-width: 400px;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.6;
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #9ca3af; margin-bottom: 25px; line-height: 1.6; }
        .retry-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .retry-btn:active { background: #1d4ed8; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>İnternet Bağlantısı Yok</h1>
        <p>Şu anda çevrimdışısınız. İnternet bağlantınızı kontrol edip tekrar deneyin.</p>
        <button class="retry-btn" onclick="location.reload()">Tekrar Dene</button>
    </div>
</body>
</html>
